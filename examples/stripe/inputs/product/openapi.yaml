  /v1/accounts:
    get:
      description: <p>Returns a list of accounts connected to your platform via <a href="/docs/connect">Connect</a>. If you’re not a platform, the list is empty.</p>
      operationId: GetAccounts
      parameters:
      - description: Only return connected accounts that were created during the given date interval.
        explode: true
        in: query
        name: created
        required: false
        schema:
          anyOf:
          - properties:
              gt:
                type: integer
              gte:
                type: integer
              lt:
                type: integer
              lte:
                type: integer
            title: range_query_specs
            type: object
          - type: integer
        style: deepObject
      - description: A cursor for use in pagination. `ending_before` is an object ID that defines your place in the list. For instance, if you make a list request and receive 100 objects, starting with `obj_bar`, your subsequent call can include `ending_before=obj_bar` in order to fetch the previous page of the list.
        in: query
        name: ending_before
        required: false
        schema:
          type: string
        style: form
      - description: Specifies which fields in the response should be expanded.
        explode: true
        in: query
        name: expand
        required: false
        schema:
          items:
            maxLength: 5000
            type: string
          type: array
        style: deepObject
      - description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default is 10.
        in: query
        name: limit
        required: false
        schema:
          type: integer
        style: form
      - description: A cursor for use in pagination. `starting_after` is an object ID that defines your place in the list. For instance, if you make a list request and receive 100 objects, ending with `obj_foo`, your subsequent call can include `starting_after=obj_foo` in order to fetch the next page of the list.
        in: query
        name: starting_after
        required: false
        schema:
          type: string
        style: form
      requestBody:
        content:
          application/x-www-form-urlencoded:
            encoding: {}
            schema:
              additionalProperties: false
              properties: {}
              type: object
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                description: ''
                properties:
                  data:
                    items:
                      $ref: '#/components/schemas/account'
                    type: array
                  has_more:
                    description: True if this list has another page of items after this one that can be fetched.
                    type: boolean
                  object:
                    description: String representing the object's type. Objects of the same type share the same value. Always has the value `list`.
                    enum:
                    - list
                    type: string
                  url:
                    description: The URL where this list can be accessed.
                    maxLength: 5000
                    pattern: ^/v1/accounts
                    type: string
                required:
                - data
                - has_more
                - object
                - url
                title: AccountList
                type: object
                x-expandableFields:
                - data
          description: Successful response.
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
          description: Error response.
      summary: List all connected accounts
    post:
      description: '<p>With <a href="/docs/connect">Connect</a>, you can create Stripe accounts for your users.

        To do this, you’ll first need to <a href="https://dashboard.stripe.com/account/applications/settings">register your platform</a>.</p>


        <p>If you’ve already collected information for your connected accounts, you <a href="/docs/connect/best-practices#onboarding">can prefill that information</a> when

        creating the account. Connect Onboarding won’t ask for the prefilled information during account onboarding.

        You can prefill any information on the account.</p>'
      operationId: PostAccounts
      requestBody:
        content:
          application/x-www-form-urlencoded:
            encoding:
              bank_account:
                explode: true
                style: deepObject
              business_profile:
                explode: true
                style: deepObject
              capabilities:
                explode: true
                style: deepObject
              company:
                explode: true
                style: deepObject
              controller:
                explode: true
                style: deepObject
              documents:
                explode: true
                style: deepObject
              expand:
                explode: true
                style: deepObject
              groups:
                explode: true
                style: deepObject
              individual:
                explode: true
                style: deepObject
              metadata:
                explode: true
                style: deepObject
              settings:
                explode: true
                style: deepObject
              tos_acceptance:
                explode: true
                style: deepObject
            schema:
              additionalProperties: false
              properties:
                account_token:
                  description: An [account token](https://api.stripe.com#create_account_token), used to securely provide details to the account.
                  maxLength: 5000
                  type: string
                bank_account:
                  anyOf:
                  - properties:
                      account_holder_name:
                        maxLength: 5000
                        type: string
                      account_holder_type:
                        enum:
                        - company
                        - individual
                        maxLength: 5000
                        type: string
                      account_number:
                        maxLength: 5000
                        type: string
                      account_type:
                        enum:
                        - checking
                        - futsu
                        - savings
                        - toza
                        maxLength: 5000
                        type: string
                      country:
                        maxLength: 5000
                        type: string
                      currency:
                        format: currency
                        type: string
                      documents:
                        properties:
                          bank_account_ownership_verification:
                            properties:
                              files:
                                items:
                                  maxLength: 500
                                  type: string
                                type: array
                            title: documents_param
                            type: object
                        title: external_account_documents_param
                        type: object
                      object:
                        enum:
                        - bank_account
                        maxLength: 5000
                        type: string
                      routing_number:
                        maxLength: 5000
                        type: string
                    required:
                    - account_number
                    - country
                    title: external_account_payout_bank_account
                    type: object
                  - maxLength: 5000
                    type: string
                  description: Either a token, like the ones returned by [Stripe.js](https://stripe.com/docs/js), or a dictionary containing a user's bank account details.
                business_profile:
                  description: Business information about the account.
                  properties:
                    annual_revenue:
                      properties:
                        amount:
                          type: integer
                        currency:
                          format: currency
                          type: string
                        fiscal_year_end:
