                          type: string
                        country:
                          maxLength: 5000
                          type: string
                        line1:
                          maxLength: 200
                          type: string
                        line2:
                          maxLength: 200
                          type: string
                        postal_code:
                          maxLength: 5000
                          type: string
                        state:
                          maxLength: 5000
                          type: string
                      title: address_specs
                      type: object
                    support_email:
                      type: string
                    support_phone:
                      maxLength: 5000
                      type: string
                    support_url:
                      anyOf:
                      - type: string
                      - enum:
                        - ''
                        type: string
                    url:
                      type: string
                  title: business_profile_specs
                  type: object
                business_type:
                  description: The business type. Once you create an [Account Link](/api/account_links) or [Account Session](/api/account_sessions), this property can only be updated for accounts where [controller.requirement_collection](/api/accounts/object#account_object-controller-requirement_collection) is `application`, which includes Custom accounts.
                  enum:
                  - company
                  - government_entity
                  - individual
                  - non_profit
                  type: string
                  x-stripeBypassValidation: true
                capabilities:
                  description: 'Each key of the dictionary represents a capability, and each capability

                    maps to its settings (for example, whether it has been requested or not). Each

                    capability is inactive until you have provided its specific

                    requirements and Stripe has verified them. An account might have some

                    of its requested capabilities be active and some be inactive.


                    Required when [account.controller.stripe_dashboard.type](/api/accounts/create#create_account-controller-dashboard-type)

                    is `none`, which includes Custom accounts.'
                  properties:
                    acss_debit_payments:
                      properties:
                        requested:
                          type: boolean
                      title: capability_param
                      type: object
                    affirm_payments:
                      properties:
